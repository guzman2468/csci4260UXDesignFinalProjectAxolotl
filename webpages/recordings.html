<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recordings</title>
  <link rel="stylesheet" href="../stylesheets/recordings.css">
</head>
<body>
  <header class="top-bar">
    <div class="profile-icon" id="profileIcon" title="Logged in">
  <span id="profileLetter">?</span>
</div>
    <h1>Recordings</h1>
  </header>

  <main class="recordings-wrapper">
    <section class="recordings-card">
      <button class="close-btn" id="closeBtn">×</button>
      <h2>Your recently recorded sessions</h2>
      <p class="section-title">Recordings</p>

      <div class="table-card">
        <div class="table-header">
          <div class="col-title">Title</div>
          <div class="col-date">Date</div>
          <div class="col-share">Share</div>
        </div>

        <div class="table-body">
          <div class="table-row">
            <div class="col-title">Ambient Sketch 01</div>
            <div class="col-date">04/12/2026</div>
            <div class="col-share"><button class="share-btn">Share</button></div>
          </div>

          <div class="table-row">
            <div class="col-title">Late Night Loop</div>
            <div class="col-date">04/10/2026</div>
            <div class="col-share"><button class="share-btn">Share</button></div>
          </div>

          <div class="table-row">
            <div class="col-title">Water Texture Demo</div>
            <div class="col-date">04/08/2026</div>
            <div class="col-share"><button class="share-btn">Share</button></div>
          </div>

          <div class="table-row">
            <div class="col-title">Test Recording A</div>
            <div class="col-date">04/05/2026</div>
            <div class="col-share"><button class="share-btn">Share</button></div>
          </div>
        </div>
      </div>
    </section>
  </main>
<div id="tourOverlay" class="tour-overlay hidden">
  <div id="tourHighlight" class="tour-highlight"></div>

  <div id="tourPopup" class="tour-popup hidden">
    <button id="tourCloseBtn" class="tour-close-btn">×</button>
    <h2 id="tourTitle">Welcome</h2>
    <p id="tourText"></p>

    <div class="tour-buttons">
      <button id="tourNextBtn" class="tour-btn">Next</button>
    </div>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../logic/recordings.js"></script>
</body>
</html>
