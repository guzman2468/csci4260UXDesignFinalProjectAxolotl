<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Page</title>
  <link rel="stylesheet" href="../stylesheets/createPage.css">
</head>
<body>
  <header class="top-bar">
<div class="profile-menu-container">
  <div class="profile-icon" id="profileIcon" title="Logged in">
    <span id="profileLetter">?</span>
  </div>

  <div class="profile-dropdown hidden" id="profileDropdown">
    <button id="logoutBtn">Logout</button>
  </div>
</div>
    <h1>Create</h1>

    <div id="recordModal" class="record-pill">
      🔴 Recording...
    </div>
  </header>

  <main class="page-layout">
    <aside class="side-panel">
      <button class="menu-button" id="menuButton" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="side-menu" id="sideMenu">
        <button class="menu-link" id="recordBtn">Record</button>
        <button class="menu-link" id="settingsBtn">Settings</button>
        <button class="menu-link exit-link" id="exitBtn">Exit</button>
      </nav>
    </aside>

    <section class="content-area">
 
  <!-- The main canvas -->
  <div class="content-card" id="contentCard">
  </div>
 
  <!-- Transport bar — sits snug under the content card -->
  <div class="transport-bar">
 
    <!-- Row 1: play/pause · scrubber · time -->
    <div class="transport-controls">
      <button id="play-pause" title="Play / Pause">&#9654;</button>
      <input type="range" id="scrubber" min="0" max="600" value="0" step="1">
      <span id="time-label">0.0 / 6.0s</span>
    </div>
 
    <!-- Row 2: ruler with tick marks (built by JS) -->
    <div id="ruler-wrap">
      <div id="ruler-track">
        <div id="ruler-fill"></div>
      </div>
      <!-- tick marks injected here by buildRuler() -->
    </div>
 
  </div>

  <button id="saveBtn">Save Project</button>
  <div id="saveModal" class="save-modal hidden">
    <div class="save-modal-card">
      <h2>Save Project</h2>
      <input type="text" id="projectNameInput" placeholder="Enter project name..." />
      <div class="save-modal-buttons">
        <button id="saveConfirmBtn">Save</button>
        <button id="saveCancelBtn">Cancel</button>
      </div>
    </div>
  </div>
 
</section>
  </main>

  <div id="tourOverlay" class="tour-overlay hidden">
  <div id="tourHighlight" class="tour-highlight"></div>

  <div id="tourPopup" class="tour-popup hidden">
    <button id="tourCloseBtn" class="tour-close-btn" aria-label="Close tutorial">×</button>
    <h2 id="tourTitle">Welcome</h2>
    <p id="tourText">This is the tutorial.</p>

    <div class="tour-buttons">
      <button id="tourNextBtn" class="tour-btn">Next</button>
    </div>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../logic/createPage.js"></script>
</body>
</html>
