<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../stylesheets/dashboard.css">
</head>
<body>
  <header class="top-bar">
<div class="profile-menu-container">
  <div class="profile-icon" id="profileIcon" title="Logged in">
    <span id="profileLetter">?</span>
  </div>

  <div class="profile-dropdown hidden" id="profileDropdown">
    <button id="logoutBtn">Logout</button>
  </div>
</div>
    <h1>SOUND BOARD START MENU</h1>
  </header>

  <main class="dashboard-wrapper">
    <section class="hero-section">
      <button class="create-btn" id="createBtn">Create</button>
      <button class="recordings-btn" id="recordingsBtn">Recordings</button>
    </section>

    <section class="table-card">
      <div class="table-header">
        <div class="col-title">Title</div>
        <div class="col-date">Date</div>
        <div class="col-share">Share</div>
        <div class="col-delete">Delete</div>
      </div>

      <!-- ONLY THIS stays empty -->
      <div class="table-body" id="recordingsTable">
        <!-- JS will inject rows here -->
      </div>
    </section>
    <section class="auth-footer">
      <div id="userInfo" class="user-info" style="display:none;"></div>

      <button class="auth-btn sign-in">Sign In</button>
      <button class="auth-btn sign-up">Sign Up</button>
    </section>
  </main>
  <div id="deleteModal" class="delete-modal hidden">
    <div class="delete-modal-card">
      <h2 id="deleteModalTitle">Delete this project?</h2>
      <p>This cannot be undone.</p>
      <div class="delete-modal-buttons">
        <button id="deleteConfirmBtn">Delete</button>
        <button id="deleteCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="tourOverlay" class="tour-overlay hidden">
  <div id="tourHighlight" class="tour-highlight"></div>

  <div id="tourPopup" class="tour-popup hidden">
    <button id="tourCloseBtn" class="tour-close-btn" aria-label="Close tutorial">×</button>
    <h2 id="tourTitle">Welcome</h2>
    <p id="tourText">This is the tutorial.</p>

    <div class="tour-buttons">
      <button id="tourNextBtn" class="tour-btn">Next</button>
    </div>
  </div>
</div>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../logic/dashboard.js"></script>
</body>
</html>
