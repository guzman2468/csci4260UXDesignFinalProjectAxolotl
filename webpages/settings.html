<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="../stylesheets/settings.css">
</head>
<body>
  <header class="top-bar">
<div class="profile-menu-container">
  <div class="profile-icon" id="profileIcon" title="Logged in">
    <span id="profileLetter">?</span>
  </div>

  <div class="profile-dropdown hidden" id="profileDropdown">
    <button id="logoutBtn">Logout</button>
  </div>
</div>
    <h1>SOUND BOARD SETTINGS</h1>
  </header>

  <main class="settings-wrapper">
    <section class="settings-card">
      <button class="close-btn" id="closeBtn" aria-label="Close settings">×</button>

      <h2 class="section-title">Customize your sound experience</h2>

      <div class="divider"></div>

      <form class="settings-form">
        <div class="setting-row">
          <label for="soundPreset">Sound Preset</label>
          <select id="soundPreset">
            <option>Acoustic</option>
            <option>Drums</option>
            <option>Drums2</option>
            <option>Synth</option>
            <option>Electric</option>
          </select>
        </div>

        <div class="setting-row">
          <label for="volume">Volume</label>
          <select id="volume">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Max</option>
          </select>
        </div>

        <div class="setting-row">
          <label for="length">Length (seconds)</label>
            <input 
              type="number" 
              id="length"
              min="1"
              max="300"
              step="1"
              value="6"
            />
        </div>

        <div class="setting-row">
          <label for="reverb">Reverb</label>
          <select id="reverb">
            <option>Small Room</option>
            <option>Hall</option>
            <option>Plate</option>
            <option>Large Space</option>
          </select>
        </div>

        <button type="button" class="save-btn" id="saveSettingsBtn">Save</button>
        <p class="save-message" id="saveMessage"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../logic/settings.js"></script>
</body>
</html>
